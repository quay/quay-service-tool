DATABASE_SECRET_KEY: 'randomkey'
DB_URI: postgresql://quay:quay@quay-db/quay
# If service tool backend is run outside a container:
#DB_URI: postgresql://quay:quay@0.0.0.0:5432/quay
is_local: true

# Used to test authentication in local env
test_auth: false
authentication:
  url: http://host.docker.internal:8081/auth
  # If keycloak is run outside a container
#  url: http://localhost:8081/auth/
  realm: Test
  clientid: test-client-id
  roles:
    ADMIN_ROLE: 'admin-role'
    EXPORT_COMPLIANCE_ROLE: 'export-compliance-role'
    PROTECTED_ADMIN_ROLE: 'protected-admin-role'
  protected_namespaces:
    - openshift-release-dev
    - redhat-prod
    - redhat
    - redhat-user-workloads
    - openshift
    - redhat-pending
    - redhat-services-prod
    - redhat-services-pending
    - openshift-logging
    - openshift-pipeline
    - openshiftio
# Red Hat Marketplace API configuration
# In production, set FEATURE_RH_MARKETPLACE to true and provide the
# API endpoints and certs. The cert/key values should match the ones
# used by quay (from app-interface secret config).
FEATURE_RH_MARKETPLACE: false
ENTITLEMENT_RECONCILIATION_USER_ENDPOINT: ""
ENTITLEMENT_RECONCILIATION_MARKETPLACE_ENDPOINT: ""
# PEM-encoded marketplace API cert and key (same as quay's
# quay-marketplace-api.crt/.key). Written to /conf/stack/ on startup.
# MARKETPLACE_CERT: <PEM-encoded certificate>
# MARKETPLACE_KEY: <PEM-encoded private key>

ENV: development
DEBUG: true
