DATABASE_SECRET_KEY: 'randomkey'
DB_URI: postgresql://quay:quay@quay-db/quay
# If service tool backend is run outside a container:
#DB_URI: postgresql://quay:quay@0.0.0.0:5432/quay
is_local: true
QUAY_UI_URL: https://quay.io

# Used to test authentication in local env
test_auth: false
authentication:
  url: http://host.docker.internal:8081/auth
  # If keycloak is run outside a container
#  url: http://localhost:8081/auth/
  realm: Test
  clientid: test-client-id
  roles:
    ADMIN_ROLE: 'admin-role'
    EXPORT_COMPLIANCE_ROLE: 'export-compliance-role'
    PROTECTED_ADMIN_ROLE: 'protected-admin-role'
    SPAM_DETECTION_ROLE: 'spam-detection-role'
    SPAM_DETECTION_REMEDIATION_ROLE: 'spam-detection-remediation-role'
  protected_namespaces:
    - openshift-release-dev
    - redhat-prod
    - redhat
    - redhat-user-workloads
    - openshift
    - redhat-pending
    - redhat-services-prod
    - redhat-services-pending
    - openshift-logging
    - openshift-pipeline
    - openshiftio
# Red Hat Marketplace API configuration
# In production, set FEATURE_RH_MARKETPLACE to true and provide the
# API endpoints and certs. The cert/key values should match the ones
# used by quay (from app-interface secret config).
FEATURE_RH_MARKETPLACE: false
ENTITLEMENT_RECONCILIATION_USER_ENDPOINT: ""
ENTITLEMENT_RECONCILIATION_MARKETPLACE_ENDPOINT: ""
# PEM-encoded marketplace API cert and key (same as quay's
# quay-marketplace-api.crt/.key). Written to /conf/stack/ on startup.
# MARKETPLACE_CERT: <PEM-encoded certificate>
# MARKETPLACE_KEY: <PEM-encoded private key>

ENV: development
DEBUG: true

# Quay spam detection service-tool state and DB access.
SPAM_DETECTION_STATE_DB_URI: sqlite:///spam_detection_state.db
# Production deployments should point this at a read-only Quay user or replica.
SPAM_DETECTION_READONLY_DB_URI: postgresql://quay:quay@quay-db/quay
# Only approved quarantine, restore, and redaction actions use this write-capable path.
SPAM_DETECTION_WRITE_DB_URI: postgresql://quay:quay@quay-db/quay
SPAM_DETECTION_ARTIFACT_DIR: spam_detection_artifacts
SPAM_DETECTION_MAX_ARTIFACT_BYTES: 26214400
SPAM_DETECTION_BATCH_SIZE: 200
SPAM_DETECTION_SLEEP_BETWEEN_BATCHES: 0.5
SPAM_DETECTION_SCAN_DRY_RUN: true
SPAM_DETECTION_RESCAN_TERMINAL_RECORDS: false
SPAM_DETECTION_MAX_REPOS: 0
SPAM_DETECTION_API_SCAN_LIMIT: 10000
SPAM_DETECTION_MAX_TRAINING_TEXT_LENGTH: 10000
SPAM_DETECTION_MIN_SPAM_EXAMPLES: 10
SPAM_DETECTION_MIN_HAM_EXAMPLES: 10
SPAM_DETECTION_INCLUDE_PRIVATE: false
SPAM_DETECTION_QUARANTINE_DESCRIPTION: "This repository description was removed by Quay spam detection. To request restoration, contact Quay support with the namespace and repository name. Before requesting restore, remove promotional, deceptive, or unrelated link content. Restore requests are reviewed within the deployment's published support timeline."
